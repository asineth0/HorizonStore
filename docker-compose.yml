services:
  horizon-store:
    build:
      context: .
      dockerfile: Dockerfile
    image: horizon-store:latest
    restart: unless-stopped
    init: true
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: ${PORT:-3000}
      NITRO_HOST: 0.0.0.0
      NITRO_PORT: ${PORT:-3000}
      NUXT_PUBLIC_API_PUBLIC_KEY: ${NUXT_PUBLIC_API_PUBLIC_KEY:?NUXT_PUBLIC_API_PUBLIC_KEY is required}
      NUXT_API_PRIVATE_KEY: ${NUXT_API_PRIVATE_KEY:?NUXT_API_PRIVATE_KEY is required}
      NUXT_PUBLIC_API_BASE_URL: ${NUXT_PUBLIC_API_BASE_URL:-https://headless.tebex.io}
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
